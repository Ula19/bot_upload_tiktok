services:
  # Наш бот
  bot:
    build: .
    container_name: bot_4_tiktok
    restart: unless-stopped
    env_file: .env
    environment:
      # URL Local Bot API (контейнер bot-api) — файлы до 2 ГБ
      BOT_API_URL: http://bot-api:8081
      # Cobalt API (по умолчанию берётся из .env)
      COBALT_API_URL: ${COBALT_API_URL:-http://cobalt:9000}
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_started
    volumes:
      # tmp для скачанных видео (не занимает место в контейнере)
      - /tmp/tiktok_bot:/tmp/tiktok_bot
      # доступ к файлам Local Bot API (при отправке больших файлов)
      - bot-api-data:/var/lib/telegram-bot-api

  # Local Bot API — файлы до 2 ГБ без ограничений
  bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: bot_4_tiktok_api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "${BOT_API_PORT:-8091}:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
      - /tmp/tiktok_bot:/tmp/tiktok_bot

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: bot_4_tiktok_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_tiktok}
      POSTGRES_USER: ${DB_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_user} -d ${DB_NAME:-bot_4_tiktok}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bot-api-data:
